<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte produit</title>
    <link rel="stylesheet" href="carte.css">
</head>
<body>
    <header>
        <h1>Ma carte produit</h1>
    </header>
    <main>
        <section id="carte">
            <div id="image">
                <img src="casque_noir.png" alt="casque noir">

            <div id="contenu">
                <h2>Casque sans fil pro</h2>
                <p>Profitez d'un son immersif et d'un confort optimal pour vos sessions de jeu et d'écoute.</p>
                <span>2500CFA</span>
            </div>
            <button>Acheter</button>
        </section>
    </main>
</body>
</html>
